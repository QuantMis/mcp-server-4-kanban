# Reverse proxy for the Planka MCP server (SSE transport on 127.0.0.1:3001).
#
# Stage 1 (this file): plain HTTP on :80 so you can verify reachability.
# Stage 2: run `certbot --nginx -d planka-mcp.codedancoffee.com` — certbot
#          edits this file in place, adds the :443 server block + TLS, and
#          turns the block below into an HTTP->HTTPS redirect.
#
# Install: copy to /etc/nginx/sites-available/planka-mcp.conf, then
#   ln -s /etc/nginx/sites-available/planka-mcp.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

# --- Client auth: static bearer token --------------------------------------
# The planka-mcp image has NO client auth of its own, so we gate it here.
# Generate a secret with:  openssl rand -hex 32
# Then register in Claude Code with:
#   claude mcp add --transport sse planka https://<host>/sse \
#     --header "Authorization: Bearer <token>"
# NOTE: this protects Claude Code. Claude Web connectors need OAuth instead
# (see Route A in the project notes) — a static token won't work there.
map $http_authorization $mcp_ok {
    default                                 0;
    "Bearer REPLACE_WITH_openssl_rand_hex_32" 1;
}

server {
    listen 80;
    listen [::]:80;

    # CHANGE this to the hostname you'll point at this server.
    server_name planka-mcp.codedancoffee.com;

    # MCP SSE endpoint. The container publishes on host loopback (see
    # docker-compose.yml: ports "127.0.0.1:3001:3001").
    location / {
        # Reject any request that isn't carrying the bearer token.
        if ($mcp_ok = 0) { return 401; }

        proxy_pass http://127.0.0.1:3001;

        # --- SSE essentials: without these the event stream stalls ---
        proxy_http_version 1.1;
        proxy_set_header Connection "";   # keep the upstream connection alive
        proxy_buffering off;              # stream events immediately, don't buffer
        proxy_cache off;
        chunked_transfer_encoding off;

        # Long-lived stream: don't let nginx time out an idle-but-open SSE conn.
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;

        # --- Standard forwarded headers ---
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
